services:
  - type: web
    name: stock-news-dashboard
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # 단일 워커: 백그라운드 RSS 수집 스레드가 중복 실행되지 않도록.
    # --timeout 30: 콜드 스타트 후 초기 fetch 동안 죽지 않도록.
    startCommand: gunicorn --workers 1 --threads 4 --timeout 30 --bind 0.0.0.0:$PORT server:app
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
