<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>주식·코인 뉴스 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot" id="liveDot"></span>
      <div>
        <h1>Market News Live</h1>
        <p class="muted" id="statusLine">불러오는 중…</p>
      </div>
    </div>
    <div class="controls">
      <div class="search">
        <input id="searchInput" type="search" placeholder="제목·요약·종목 검색" autocomplete="off" />
      </div>
      <button id="refreshBtn" class="btn" title="지금 새로고침">
        <span class="ico">↻</span><span class="lbl">새로고침</span>
      </button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-filter="kr_stock">🇰🇷 국내주식</button>
    <button class="tab" data-filter="us_stock">🇺🇸 해외주식</button>
    <button class="tab" data-filter="kr_coin">🇰🇷 국내코인</button>
    <button class="tab" data-filter="us_coin">🇺🇸 해외코인</button>
    <span class="count" id="countLabel">0건</span>
  </nav>

  <main class="layout">
    <section class="col" id="activeColumn">
      <h2 class="col-title" id="activeColTitle">국내주식</h2>
      <div class="list" id="newsList">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span id="updatedAt">—</span>
    <span class="sep">·</span>
    <span id="autoRefresh">자동 새로고침: 60초</span>
  </footer>

  <script src="/app.js" defer></script>
</body>
</html>
